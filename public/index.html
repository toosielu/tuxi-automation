<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>图喜 AI｜小红书爆款内容生成</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">图</div>
          <div>
            <strong>图喜 AI</strong>
            <span>爆款图文生成器</span>
          </div>
        </div>
        <nav class="nav-list">
          <a class="active" href="#generator">生成台</a>
          <a href="#covers">封面图方案</a>
          <a href="#posts">爆款文案</a>
          <a href="#product">商品承接</a>
          <a href="#dm">私信话术</a>
          <a href="#history">历史记录</a>
        </nav>
        <div class="sidebar-note">
          <span>V1</span>
          <p>文字、图片、链接三种输入方式，生成可复制的小红书封面方案和文案。</p>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Xiaohongshu AI Studio</p>
            <h1>输入素材，生成可发布的小红书爆款图文</h1>
          </div>
          <button id="demoButton" class="ghost-button" type="button">填入演示数据</button>
        </header>

        <section id="generator" class="generator-layout">
          <form id="generateForm" class="panel control-panel">
            <div class="panel-head compact-head">
              <div>
                <p class="eyebrow">Create</p>
                <h2>选择生成方式</h2>
              </div>
              <input id="sourceType" name="sourceType" type="hidden" value="TEXT">
            </div>

            <div class="mode-tabs" role="tablist" aria-label="生成方式">
              <button class="mode-tab active" type="button" data-mode="TEXT">文字生帖子</button>
              <button class="mode-tab" type="button" data-mode="IMAGE">图片生帖子</button>
              <button class="mode-tab" type="button" data-mode="LINK">链接生帖子</button>
            </div>

            <div class="mode-panel" data-panel="TEXT">
              <label>
                输入原始素材
                <textarea name="sourceText" rows="5" placeholder="粘贴你已有的资料、想法、产品介绍或爆款参考结构"></textarea>
              </label>
            </div>

            <div class="mode-panel hidden" data-panel="IMAGE">
              <label>
                上传参考图
                <input id="imageFile" type="file" accept="image/*">
              </label>
              <label>
                图片内容描述
                <textarea name="imageNotes" rows="4" placeholder="描述图片里有什么、想模仿哪种封面感觉、产品截图重点是什么"></textarea>
              </label>
            </div>

            <div class="mode-panel hidden" data-panel="LINK">
              <label>
                参考链接
                <input name="sourceLink" placeholder="粘贴小红书、公众号、网页或商品页链接">
              </label>
              <label>
                链接补充说明
                <textarea name="linkNotes" rows="3" placeholder="说明你想借鉴它的标题、结构、封面还是选题角度"></textarea>
              </label>
            </div>

            <div class="form-grid">
              <label>
                目标赛道
                <input name="niche" required placeholder="AI 提效、商业副业、教辅、母婴育儿">
              </label>
              <label>
                产品名称
                <input name="productName" required placeholder="小红书虚拟电商实操资料包">
              </label>
              <label>
                目标人群
                <input name="targetUser" required placeholder="想做副业的新手">
              </label>
              <label>
                内容目的
                <select name="goal" required>
                  <option>引流涨粉</option>
                  <option>私信咨询</option>
                  <option>店铺点击</option>
                  <option selected>产品成交</option>
                  <option>信任建立</option>
                </select>
              </label>
            </div>

            <label>
              产品卖点
              <textarea name="sellingPoints" required rows="3" placeholder="低成本、可复制、适合新手、自动发货"></textarea>
            </label>

            <div class="field-row">
              <label>
                风格选择
                <select name="style">
                  <option selected>干货型</option>
                  <option>结果型</option>
                  <option>避坑型</option>
                  <option>反差型</option>
                  <option>真实记录型</option>
                  <option>清单型</option>
                </select>
              </label>
              <label>
                当前卡点
                <input name="painPoint" placeholder="不知道发什么，也不知道怎么承接成交">
              </label>
            </div>

            <button class="primary-button" type="submit">生成爆款内容</button>
          </form>

          <section class="panel output-panel">
            <div class="panel-head">
              <p class="eyebrow">Output</p>
              <h2>生成结果</h2>
            </div>
            <div id="emptyState" class="empty-state">
              左侧填写后，一次生成封面图方案、爆款文案、商品承接和私信话术。
            </div>
            <div id="summaryCards" class="summary-cards hidden"></div>
          </section>
        </section>

        <section id="covers" class="result-band hidden">
          <div class="section-title">
            <p class="eyebrow">Covers</p>
            <h2>爆款封面图方案</h2>
          </div>
          <div id="coverResult" class="card-grid"></div>
        </section>

        <section id="posts" class="result-band hidden">
          <div class="section-title">
            <p class="eyebrow">Posts</p>
            <h2>可复制小红书文案</h2>
          </div>
          <div id="postResult" class="card-grid"></div>
        </section>

        <section id="product" class="result-band hidden">
          <div class="section-title">
            <p class="eyebrow">Product</p>
            <h2>商品承接文案</h2>
          </div>
          <div id="productCopyResult"></div>
        </section>

        <section id="dm" class="result-band hidden">
          <div class="section-title">
            <p class="eyebrow">DM</p>
            <h2>私信引导话术</h2>
          </div>
          <div id="dmResult" class="script-list"></div>
        </section>

        <section id="history" class="result-band">
          <div class="section-title">
            <p class="eyebrow">History</p>
            <h2>历史记录</h2>
          </div>
          <div id="historyResult" class="script-list"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
